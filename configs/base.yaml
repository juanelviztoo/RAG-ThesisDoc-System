project:
  name: "rag-skripsi-system"

paths:
  data_raw_dir: "data_raw"
  runs_dir: "runs"

index:
  persist_dir: "data_index/chroma"
  collection_name: "skripsi_naive"

embeddings:
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  device: "cpu"

chunking:
  chunk_size: 1200
  chunk_overlap: 200

retrieval:
  top_k: 8
  mode: "dense"   # dense | hybrid
  rrf_k: 60

bm25:
  k1: 1.5
  b: 0.75
  use_sastrawi: false

memory:
  enabled: false
  window: 4

llm:
  # provider bisa dioverride oleh env var: LLM_PROVIDER
  # pilihan: groq | openai | ollama
  provider: "groq"
  max_chars_per_ctx: 1800

  # model default (fallback kalau env var model tidak di-set)
  # groq    : llama3-8b-8192
  # openai  : gpt-4o-mini
  # ollama  : llama3
  model: "llama3-8b-8192"

  temperature: 0.2
  max_tokens: 512
  timeout: 60
  max_retries: 2