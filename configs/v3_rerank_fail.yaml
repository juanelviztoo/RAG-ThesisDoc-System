# configs/v3.yaml
# V3.0a — Structure-Aware Parsing + Dual Stream + Dual Collection
# Override di atas base.yaml via deep merge (src/core/config.py)

index:
  # V3.0a: ganti dari single collection → dual collection
  # collection_name (V1/V2) sudah tidak dipakai — field ini diabaikan jika
  # collections hadir. ingest.py V3.0a akan baca dari index.collections.*
  collections:
    narasi: "skripsi_structured_narasi"
    sitasi: "skripsi_structured_sitasi"

chunking:
  # Override base chunking untuk narasi (konten bab)
  # Sitasi lebih kecil: satu entry referensi ≈ 300-500 karakter
  narasi:
    chunk_size: 1200
    chunk_overlap: 200
  sitasi:
    chunk_size: 500
    chunk_overlap: 50

parsing:
  # Hybrid approach: filename routing dulu, regex fallback untuk PDF utuh
  filename_routing: true
  regex_fallback: true
  # Halaman awal yang di-scan untuk ekstraksi metadata dokumen (0-indexed)
  metadata_scan_pages: 3
  # Jika bab header sama muncul > threshold kali → dianggap running header, skip
  running_header_threshold: 3

retrieval:
  # V3.0a: default query ke collection narasi
  # sitasi diquery hanya untuk intent referensi/citation (V3.0b akan perkuat ini)
  default_collection: "narasi"
  mode: "hybrid"

bm25:
  use_sastrawi: true

memory:
  enabled: true
  window: 4

metadata_routing:
  enabled: true
  allow_in_eval: false
  doc_catalog_filename: doc_catalog.json

# ── V3.0b: Metadata Self-Querying Filtering ──────────────────────────────────
self_query:
  # Aktifkan self-querying filtering
  # false = fitur mati, semua query langsung ke retrieval penuh (perilaku V3.0a)
  enabled: true

  # Matikan saat eval mode agar hasil ablation study konsisten/reproducible
  # (logika ini diterapkan di app_streamlit.py, bukan di self_query.py)
  allow_in_eval: false

  # Maksimum jumlah field filter yang dipakai sekaligus di where clause
  # (mis. 2 = hanya tahun + prodi, tidak penulis meski ada di query)
  max_filter_fields: 2

  # LLM settings override untuk task JSON extraction
  # temperature=0.0 agar output JSON deterministik dan konsisten
  llm_temperature: 0.0
  # max_tokens=256 cukup untuk output JSON pendek
  llm_max_tokens: 256

# ── V3.0c: Cross-Encoder Reranking ───────────────────────────────────────────
reranker:
  # Aktifkan/matikan reranking
  # false = pipeline kembali ke perilaku V3.0b (Top-k langsung ke LLM)
  enabled: true

  # Model Cross-Encoder dari sentence-transformers
  # BAAI/bge-reranker-base: ~270MB, multilingual, cukup untuk skripsi Indo+Inggris
  model_name: "BAAI/does-not-exist-reranker"

  # Jumlah kandidat yang diambil dari retrieval sebelum reranking.
  # Retrieval mengambil candidate_k node → Cross-Encoder scoring → ambil top_n_rerank.
  # Harus >= top_n_rerank. Idealnya sama dengan retrieval.top_k (default: 8).
  # Di-override ke 10 di sini agar kandidat rerank lebih banyak dari top_k default.
  candidate_k: 10

  # Jumlah node final yang dikirim ke LLM setelah reranking.
  # Nama field ini konsisten dengan penamaan di app_streamlit.py dan reranker.py.
  # Top-N default untuk query biasa / single-target / definisional
  top_n_rerank: 3

  # ── V3.0c refinement: dynamic top-n ─────────────────────────────
  # Jika query multi-target / comparison / steps, final contexts
  # tidak lagi dipaksa sesempit Top-3.
  dynamic_top_n: true

  # Top-N untuk query kompleks:
  # - multi_target
  # - steps query
  # - comparison / force_per_method
  top_n_rerank_complex: 5

  # ── V3.0c refinement: deterministic anchor reservation ──────────
  # Untuk query multi-target/steps, setiap metode target harus punya
  # minimal 1 anchor node final (jika tersedia di candidate pool).
  reserve_method_anchors: true

  # ── UI enrichment / before-vs-after rerank ──────────────────────
  # Tampilkan panel audit sebelum vs sesudah rerank di UI.
  show_before_after_panel: true

  # Batas jumlah kandidat pre-rerank yang ditampilkan di panel before/after.
  # Bukan memengaruhi retrieval asli, hanya UI.
  before_after_ui_max_pre_rows: 10

  # Strategi device: auto | cpu | cuda
  # auto: pakai CUDA jika tersedia DAN free VRAM >= min_vram_mb, fallback CPU
  # cpu : paksa CPU (aman untuk VRAM 4GB, sedikit lebih lambat)
  # cuda: paksa CUDA (risiko OOM jika VRAM tidak cukup)
  device: "auto"

  # Minimum free VRAM (MB) yang dibutuhkan untuk menggunakan CUDA
  # BAAI/bge-reranker-base ~270MB weights + buffer aktivasi
  # Default 800MB memberikan ruang aman sebelum LLM dimuat
  min_vram_mb: 800

  # Tetap aktifkan reranking di eval mode?
  # true  = reranking aktif saat eval (DIREKOMENDASIKAN untuk Skenario C ablation).
  #         Berbeda dengan self_query (allow_in_eval: false) karena reranking adalah
  #         bagian inti proposed method yang justru harus diukur kontribusinya di RAGAS.
  # false = matikan reranking saat eval.
  allow_in_eval: true