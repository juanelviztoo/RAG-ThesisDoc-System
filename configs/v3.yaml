# configs/v3.yaml
# V3.0a — Structure-Aware Parsing + Dual Stream + Dual Collection
# Override di atas base.yaml via deep merge (src/core/config.py)

index:
  # V3.0a: ganti dari single collection → dual collection
  # collection_name (V1/V2) sudah tidak dipakai — field ini diabaikan jika
  # collections hadir. ingest.py V3.0a akan baca dari index.collections.*
  collections:
    narasi: "skripsi_structured_narasi"
    sitasi: "skripsi_structured_sitasi"

chunking:
  # Override base chunking untuk narasi (konten bab)
  # Sitasi lebih kecil: satu entry referensi ≈ 300-500 karakter
  narasi:
    chunk_size: 1200
    chunk_overlap: 200
  sitasi:
    chunk_size: 500
    chunk_overlap: 50

parsing:
  # Hybrid approach: filename routing dulu, regex fallback untuk PDF utuh
  filename_routing: true
  regex_fallback: true
  # Halaman awal yang di-scan untuk ekstraksi metadata dokumen (0-indexed)
  metadata_scan_pages: 3
  # Jika bab header sama muncul > threshold kali → dianggap running header, skip
  running_header_threshold: 3

retrieval:
  # V3.0a: default query ke collection narasi
  # sitasi diquery hanya untuk intent referensi/citation (V3.0b akan perkuat ini)
  default_collection: "narasi"
  mode: "hybrid"

bm25:
  use_sastrawi: true

memory:
  enabled: true
  window: 4

metadata_routing:
  enabled: true
  allow_in_eval: false
  doc_catalog_filename: doc_catalog.json

# ── V3.0b: Metadata Self-Querying Filtering ──────────────────────────────────
self_query:
  # Aktifkan self-querying filtering
  # false = fitur mati, semua query langsung ke retrieval penuh (perilaku V3.0a)
  enabled: true

  # Matikan saat eval mode agar hasil ablation study konsisten/reproducible
  # (logika ini diterapkan di app_streamlit.py, bukan di self_query.py)
  allow_in_eval: false

  # Maksimum jumlah field filter yang dipakai sekaligus di where clause
  # (mis. 2 = hanya tahun + prodi, tidak penulis meski ada di query)
  max_filter_fields: 2

  # LLM settings override untuk task JSON extraction
  # temperature=0.0 agar output JSON deterministik dan konsisten
  llm_temperature: 0.0
  # max_tokens=256 cukup untuk output JSON pendek
  llm_max_tokens: 256